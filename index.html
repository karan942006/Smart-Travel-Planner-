<!DOCTYPE html>
<html>
<head>
<title>Smart Travel Planner Chatbot</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial;
}

body{
    margin:0;
    background:#e9f2ff;
}

.container{
    width:90%;
    max-width:800px;
    margin:20px auto;
}

.header{
    background:#0077cc;
    color:white;
    padding:15px;
    text-align:center;
    border-radius:10px;
    position:relative;
}

.toggle{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
}

.chat-box{
    background:white;
    height:450px;
    overflow-y:auto;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

.message{
    margin:10px 0;
    padding:10px;
    border-radius:10px;
}

.bot{
    background:#d6ecff;
}

.user{
    background:#c6ffd6;
    text-align:right;
}

.input-area{
    display:flex;
    margin-top:10px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 20px;
    background:#0077cc;
    color:white;
    border:none;
    cursor:pointer;
}

.dark{
    background:#222;
    color:white;
}

.dark .chat-box{
    background:#333;
}

.dark .bot{
    background:#005f99;
}

.dark .user{
    background:#006600;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
🌍 Smart Travel Planner
<span class="toggle" onclick="darkMode()">🌙</span>
</div>


<div class="chat-box" id="chat">
<div class="message bot">
Hello Traveller! ✈️<br>
Ask me about:
<br><br>
• Paris attractions<br>
• Hotels in Tokyo<br>
• Weather in Dubai<br>
• Budget for London 5 days<br>
• Itinerary for Paris
</div>
</div>


<div class="input-area">
<input id="input" placeholder="Type your travel query...">
<button onclick="reply()">Send</button>
</div>

</div>


<script>

const data = {

paris:{
attraction:
"🗼 Eiffel Tower<br>🎨 Louvre Museum<br>⛪ Notre Dame Cathedral",

hotel:
"🏨 Hotel Le Meurice - Luxury<br>🏨 ibis Paris - Budget",

weather:
"🌤 18°C, Pleasant climate",

itinerary:
"Day 1: Eiffel Tower<br>Day 2: Louvre Museum<br>Day 3: City walk & shopping"
},


tokyo:{
attraction:
"🗼 Tokyo Tower<br>⛩ Senso-ji Temple<br>🌸 Shinjuku Garden",

hotel:
"🏨 Park Hotel Tokyo<br>🏨 APA Hotel Budget",

weather:
"🌦 22°C, Light rain",

itinerary:
"Day 1: Temples<br>Day 2: Shopping<br>Day 3: Technology District"
},


dubai:{
attraction:
"🏙 Burj Khalifa<br>🏖 Palm Jumeirah<br>🏜 Desert Safari",

hotel:
"🏨 Atlantis The Palm<br>🏨 Rove Downtown",

weather:
"☀ 35°C, Hot",

itinerary:
"Day 1: Burj Khalifa<br>Day 2: Desert Safari<br>Day 3: Beach"
},


london:{
attraction:
"🎡 London Eye<br>🏰 Buckingham Palace",

hotel:
"🏨 The Savoy<br>🏨 Travelodge",

weather:
"🌧 15°C, Cloudy",

itinerary:
"Day 1: Palace<br>Day 2: Museums<br>Day 3: Shopping"
}

};


function addMessage(text, type)
{
let box=document.getElementById("chat");

box.innerHTML +=
"<div class='message "+type+"'>"+text+"</div>";

box.scrollTop=box.scrollHeight;
}


function reply()
{

let input=document.getElementById("input");

let text=input.value.toLowerCase();

if(text=="")
return;

addMessage(input.value,"user");


let answer="Sorry, I don't understand. Try asking about Paris, Tokyo, Dubai or London.";


for(let city in data)
{

if(text.includes(city))
{

if(text.includes("hotel"))
answer=data[city].hotel;


else if(text.includes("weather"))
answer=data[city].weather;


else if(text.includes("budget"))
{

let days=text.match(/\d+/);

if(days)
{
let cost=days[0]*150;
answer=
"💰 Estimated budget for "
+days[0]+
" days in "
+city+
" is $"
+cost+
" (Budget travel)";
}

else
{
answer="Please mention number of days. Example: Budget for London 5 days";
}

}


else if(text.includes("itinerary"))
answer=data[city].itinerary;


else
answer=data[city].attraction;

}

}


addMessage(answer,"bot");

input.value="";

}



function darkMode()
{
    document.body.classList.toggle("dark");

    let toggleBtn = document.querySelector(".toggle");

    if(document.body.classList.contains("dark"))
    {
        toggleBtn.innerHTML = "☀️";
    }
    else
    {
        toggleBtn.innerHTML = "🌙";
    }
}


// Enter key support

document.getElementById("input")
.addEventListener("keypress",function(e){

if(e.key==="Enter")
reply();

});


</script>

</body>

</html>
